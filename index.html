<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>tip-calculator-app-main</title>
    <link
      rel="shortcut icon"
      href="./images/favicon-32x32.png"
      type="image/x-icon"
    />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <main>
      <h1>split tter</h1>
      <section class="content">
        <div class="bill">
          <div>
            <label for="bill"> Bill </label>
            <input name="number" type="text" placeholder="$" id="bill" />
          </div>
          <h2>select tip %</h2>
          <div class="select-tip">
            <button type="button" class="btn">5%</button>
            <button type="button" class="btn">10%</button>
            <button type="button" class="btn">15%</button>
            <button type="button" class="btn">25%</button><button>50%</button>
            <input type="text" class="" id="custom" placeholder="custom" />
          </div>
          <div>
            <label for="numOfPeople"> number of people</label>
            <input
              type="number"
              name="numberPeople"
              id="numOfPeople"
              placeholder="👤"
            />
          </div>
        </div>
        <div class="total">
          <div>
            <h4>Tip Amount <span> / person</span></h4>
            <p>$0.00</p>
          </div>
          <div>
            <h4>person Tota <span> / person</span></h4>
            <p>$0.00</p>
          </div>
          <button type="reset">Reset</button>
        </div>
      </section>
    </main>
    <script src="./script.js"></script>
  </body>
</html>
